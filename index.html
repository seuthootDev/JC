<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JPLT 단어 퀴즈</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=6" />
  </head>
  <body>
    <div class="bg-shape shape-1" aria-hidden="true"></div>
    <div class="bg-shape shape-2" aria-hidden="true"></div>

    <main class="quiz-shell">
      <header class="quiz-header">
        <p class="badge" id="roundLabel">DAY 01</p>
        <h1>JPLT 단어 퀴즈</h1>
        <p class="subtitle" id="headerSubtitle">한자를 보고 요미가나 발음을 한국어로 입력하세요</p>
      </header>

      <section class="quiz-card" id="startCard">
        <div class="question-box">
          <p class="question-label">학습할 DAY 선택</p>
          <p class="word-display small">DAY 01 ~ 50</p>
        </div>
        <div class="day-grid" id="dayGrid" role="group" aria-label="DAY 선택"></div>
        <div class="speed-settings" id="speedSettings">
          <p class="settings-title">넘어가기 속도</p>
          <label class="speed-row" for="correctDelay">
            <span>정답 후 (뜻 숙지)</span>
            <input id="correctDelay" type="range" min="0" max="8" step="0.5" value="3.5" />
            <span id="correctDelayLabel" class="speed-value">3.5초</span>
          </label>
          <label class="speed-row" for="wrongDelay">
            <span>오답 후</span>
            <input id="wrongDelay" type="range" min="0" max="5" step="0.5" value="1.5" />
            <span id="wrongDelayLabel" class="speed-value">1.5초</span>
          </label>
          <label class="speed-check">
            <input id="manualAdvance" type="checkbox" />
            직접 넘어가기 (다음 버튼만)
          </label>
        </div>
        <p class="load-hint" id="loadHint">단어장 불러오는 중…</p>
      </section>

      <section class="quiz-card hidden" id="quizCard">
        <div class="progress-wrap">
          <p id="progressText">문제 1 / 75</p>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="question-box">
          <p class="question-label" id="questionLabel">이 단어의 발음은?</p>
          <p class="word-display" id="wordDisplay">朝</p>
          <p class="mode-tag" id="modeTag">발음 입력</p>
        </div>

        <form id="answerForm" class="answer-form" autocomplete="off">
          <label for="answerInput" id="answerLabel">한국어 발음 입력</label>
          <div class="input-row">
            <input id="answerInput" type="text" placeholder="예: 아사" required />
            <button type="submit">정답 확인</button>
          </div>
        </form>

        <div id="feedback" class="feedback" aria-live="polite">
          <strong id="feedbackStatus" class="feedback-status">대기중</strong>
          <p id="meaningReveal" class="meaning-reveal hidden"></p>
          <span id="feedbackDetail" class="feedback-detail">정답 확인을 누르면 결과가 표시됩니다.</span>
        </div>

        <button type="button" id="nextButton" class="next-button hidden">다음 문제</button>

        <button type="button" class="ghost-button" id="backToDays">DAY 선택으로</button>
      </section>

      <section class="result-card hidden" id="resultCard">
        <h2 id="resultTitle">결과</h2>
        <p id="resultSummary"></p>
        <ul id="wrongList" class="wrong-list"></ul>
        <div class="result-actions">
          <button type="button" id="retryButton" class="retry-button">틀린 문제 다시 풀기</button>
          <button type="button" id="changeDayButton" class="ghost-button">다른 DAY 선택</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=6" defer></script>
  </body>
</html>
